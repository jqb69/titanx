---
# deploy.yaml
name: Deploy TitanX to DigitalOcean

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: titanxenv
    steps:
      - uses: actions/checkout@v4

      # STEP 1: Validate and fix SSH key (critical)
      - name: Validate and Fix SSH Key
        run: |
          chmod +x ${{ github.workspace }}/scripts/check-ssh-key.sh
          ${{ github.workspace }}/scripts/check-ssh-key.sh "${{ secrets.DIGITAL_OCEAN_SSH_KEY }}"

      # STEP 2: Copy scripts using the fixed key
      - name: SCP Scripts to Root Bootstrap
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DIGITAL_OCEAN_IP }}
          username: ${{ secrets.DIGITAL_OCEAN_USER }}
          key: ${{ env.VALID_SSH_KEY }}
          source: "scripts/*.sh"
          target: "/root/titanx-bootstrap"
          strip_components: 1

      # STEP 3: Execute deployment on droplet
      - name: Run TitanX Installation
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DIGITAL_OCEAN_IP }}
          username: ${{ secrets.DIGITAL_OCEAN_USER }}
          key: ${{ env.VALID_SSH_KEY }}
          envs: OPENROUTER_KEY,G_USER,G_TOKEN,P_PRIVATE_KEY
          script: |
            set -euo pipefail

            echo "=== TitanX Deployment Started ==="

            cd /root/titanx-bootstrap
            chmod +x *.sh

            # Bootstrap user + move files
            ./bootstrap-to-ajax.sh

            # Move to final project directory
            cd /home/ajax/titanx

            # Prepare + generate secrets + full install
            ./upload.sh /home/ajax/titanx
            ./generate-agetxt.sh
            ./mother-script.sh

            echo "=== TitanX Deployment Completed Successfully ==="
        env:
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          G_USER: ${{ secrets.GIT_USER }}
          G_TOKEN: ${{ secrets.GIT_TOKEN }}
          P_PRIVATE_KEY: ${{ secrets.PROJECT_PRIVATE_KEY }}
